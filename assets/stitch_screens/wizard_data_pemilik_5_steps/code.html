<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NIB Assistant - Data Pemilik</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed-dim": "#84d5c5",
                      "on-secondary-container": "#6a4800",
                      "surface-container-highest": "#e5e2e1",

                      "on-surface": "#1b1c1c",
                      "on-primary-container": "#94e5d5",
                      "on-tertiary-container": "#97e990",
                      "background": "#fcf9f8",
                      "inverse-on-surface": "#f3f0ef",
                      "surface-container-low": "#f6f3f2",
                      "outline-variant": "#bec9c5",
                      "secondary-fixed": "#ffdeac",
                      "error-container": "#ffdad6",
                      "on-background": "#1b1c1c",
                      "secondary-fixed-dim": "#ffba38",
                      "on-primary-fixed-variant": "#005046",
                      "surface-dim": "#dcd9d9",
                      "primary": "#004f45",
                      "inverse-primary": "#84d5c5",
                      "error": "#ba1a1a",
                      "bg-off-white": "#FAFAFA",
                      "on-tertiary-fixed-variant": "#005312",
                      "status-error": "#C62828",
                      "secondary": "#7e5700",
                      "on-primary": "#ffffff",
                      "tertiary-fixed": "#a3f69c",
                      "surface": "#fcf9f8",
                      "on-surface-variant": "#3e4946",
                      "tertiary-fixed-dim": "#88d982",
                      "surface-container-high": "#eae7e7",
                      "outline": "#6e7976",
                      "surface-variant": "#e5e2e1",
                      "on-error": "#ffffff",
                      "secondary-container": "#feb300",
                      "surface-bright": "#fcf9f8",
                      "surface-card": "#FFFFFF",
                      "tertiary": "#005111",
                      "primary-container": "#00695c",
                      "inverse-surface": "#303030",
                      "surface-container-lowest": "#ffffff",
                      "surface-tint": "#046b5e",
                      "surface-container": "#f0eded",
                      "on-secondary": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed": "#281900",
                      "on-tertiary-fixed": "#002204",
                      "tertiary-container": "#196b22",
                      "on-secondary-fixed-variant": "#604100",
                      "primary-fixed": "#a0f2e1",
                      "status-info": "#0277BD",
                      "on-error-container": "#93000a",
                      "on-primary-fixed": "#00201b"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "max-width-form": "640px",
                      "stack-md": "24px",
                      "container-padding-desktop": "40px",
                      "stack-sm": "12px",
                      "container-padding-mobile": "16px",
                      "gutter": "16px",
                      "base": "8px",
                      "stack-lg": "40px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Hanken Grotesk"
                      ],
                      "body-md": [
                              "Hanken Grotesk"
                      ],
                      "label-md": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg": [
                              "Hanken Grotesk"
                      ],
                      "headline-md": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg-mobile": [
                              "Hanken Grotesk"
                      ],
                      "caption": [
                              "Hanken Grotesk"
                      ]
              },
              "fontSize": {
                      "body-lg": [
                              "18px",

                      "headline-lg": [

                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"

                      ],
                      "headline-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"

                      ],
                      "headline-lg-mobile": [

                      "caption": [

        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-bg-off-white text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-4 h-14 w-full bg-background dark:bg-background">
<button aria-label="Kembali" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity flex items-center justify-center w-10 h-10 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim text-center flex-1">NIB Assistant</h1>
<button aria-label="Bantuan" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity flex items-center justify-center w-10 h-10 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-max-width-form mx-auto px-container-padding-mobile md:px-container-padding-desktop pt-8 pb-[120px] flex flex-col">
<!-- Stepper -->
<div aria-label="Progress pendaftaran" class="mb-stack-lg">
<div class="relative flex items-center justify-between w-full"><!-- Background Line -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-surface-container-highest z-0"></div>
<!-- Step 1: Data Pemilik (Active) -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-bg-off-white px-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md shadow-[0_2px_8px_rgba(0,79,69,0.3)]">
        1
    </div>
<span class="font-label-md text-label-md text-primary hidden sm:block whitespace-nowrap">Data Pemilik</span>
</div>
<!-- Step 2: Kontak & Lokasi -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-bg-off-white px-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
        2
    </div>
<span class="font-label-md text-label-md text-on-surface-variant hidden sm:block whitespace-nowrap">Kontak &amp; Lokasi</span>
</div>
<!-- Step 3: Cerita Usaha -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-bg-off-white px-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
        3
    </div>
<span class="font-label-md text-label-md text-on-surface-variant hidden sm:block whitespace-nowrap">Cerita Usaha</span>
</div>
<!-- Step 4: KBLI -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-bg-off-white px-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
        4
    </div>
<span class="font-label-md text-label-md text-on-surface-variant hidden sm:block whitespace-nowrap">KBLI</span>
</div>
<!-- Step 5: Review -->
<div class="relative z-10 flex flex-col items-center gap-2 bg-bg-off-white px-2">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
        5
    </div>
<span class="font-label-md text-label-md text-on-surface-variant hidden sm:block whitespace-nowrap">Review</span>
</div></div>
<!-- Mobile Text Fallback -->
<div class="mt-4 text-center sm:hidden"><span class="font-label-md text-label-md text-primary">Langkah 1 dari 5</span></div>
</div>
<!-- Section Header -->
<div class="mb-stack-lg text-center md:text-left">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Data Pemilik</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Gunakan data sesuai KTP untuk memudahkan proses di OSS.</p>
</div>
<!-- Form Canvas (Bento-style card) -->
<div class="bg-surface-card rounded-xl p-4 md:p-6 shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-border-light flex flex-col gap-stack-md">
<!-- Nama Lengkap Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="namaLengkap">Nama Lengkap</label>
<div class="relative">
<input class="w-full min-h-[56px] px-4 rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline" id="namaLengkap" placeholder="Masukkan nama sesuai KTP" type="text"/>
</div>
</div>
<!-- NIK Field (Masked visual representation) -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="nik">NIK (Nomor Induk Kependudukan)</label>
<div class="relative flex items-center group">
<div class="absolute left-4 text-outline-variant flex items-center">
<span class="material-symbols-outlined">badge</span>
</div>
<input class="w-full min-h-[56px] pl-12 pr-12 rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline tracking-widest font-mono" id="nik" maxlength="19" placeholder="0000 0000 0000 0000" type="text"/>
<!-- Validation Icon Placeholder -->
<div class="absolute right-4 text-outline-variant opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline">info</span>
</div>
</div>
<p class="font-caption text-caption text-on-surface-variant mt-1">Pastikan 16 digit angka sudah benar.</p>
</div>
<!-- Tanggal Lahir Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="tanggalLahir">Tanggal Lahir</label>
<div class="relative flex items-center">
<input class="w-full min-h-[56px] px-4 rounded-lg bg-surface-container-lowest border border-outline-variant text-on-surface font-body-lg text-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline [color-scheme:light]" id="tanggalLahir" type="date"/>
</div>
</div>
</div>
</main>
<!-- Bottom Sticky Action Area (Level 2 Elevation) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest shadow-[0_-8px_32px_rgba(0,0,0,0.08)] border-t border-border-light z-40 transition-transform">
<div class="max-w-max-width-form mx-auto px-container-padding-mobile md:px-container-padding-desktop py-4 flex flex-col-reverse sm:flex-row items-center justify-between gap-4">
<!-- Autosave Indicator -->
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">cloud_done</span>
<span class="font-caption text-caption">Tersimpan otomatis</span>
</div>
<!-- Primary CTA -->
<button class="w-full sm:w-auto min-h-[48px] px-8 bg-primary text-on-primary rounded-full font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-95 transition-all shadow-md">
<span>Lanjut</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</div>
</body></html>
