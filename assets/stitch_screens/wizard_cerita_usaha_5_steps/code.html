<!DOCTYPE html>

                      "outline": "#6e7976",

                      "on-error": "#ffffff",

                      "surface-bright": "#fcf9f8",
                      "surface-card": "#FFFFFF",

                      "primary-container": "#00695c",
                      "inverse-surface": "#303030",

<style>
        body {
            background-color: #FAFAFA; /* bg-off-white */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-4 h-14 w-full bg-background dark:bg-background">
<button aria-label="Kembali" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">NIB Assistant</h1>
<button aria-label="Bantuan" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity p-2 -mr-2">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</header>
<main class="w-full max-w-max-width-form px-container-padding-mobile md:px-container-padding-desktop py-8 flex-grow">
<!-- Stepper -->
<nav aria-label="Progress pendaftaran" class="mb-stack-lg">
<div class="relative flex items-center justify-between w-full"><div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-surface-container-highest z-0"></div><div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/2 h-[2px] bg-primary z-0"></div><div class="relative z-10 flex flex-col items-center gap-2 bg-background px-2"><div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md"><span class="material-symbols-outlined text-[18px]">check</span></div></div><div class="relative z-10 flex flex-col items-center gap-2 bg-background px-2"><div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md"><span class="material-symbols-outlined text-[18px]">check</span></div></div><div class="relative z-10 flex flex-col items-center gap-2 bg-background px-2"><div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md shadow-[0_2px_8px_rgba(0,79,69,0.3)]">3</div></div><div class="relative z-10 flex flex-col items-center gap-2 bg-background px-2"><div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">4</div></div><div class="relative z-10 flex flex-col items-center gap-2 bg-background px-2"><div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-label-md text-label-md">5</div></div></div>
<!-- Mobile Text Fallback -->
<div class="mt-4 text-center md:hidden">
<span class="font-label-md text-label-md text-primary">Langkah 3 dari 5</span>
</div>
</nav>
<!-- Header Content -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-stack-sm">Ceritakan Usaha Kamu</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Jelaskan kegiatan usaha kamu pakai bahasa sehari-hari. Contoh: 'Saya jual ayam geprek rumahan lewat GoFood'.</p>
</div>
<!-- Form Fields (Bento Box / Card approach for focus) -->
<div class="bg-surface-card rounded-xl p-6 shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-border-light mb-stack-lg">
<form class="space-y-stack-md">
<!-- Nama Usaha -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="nama_usaha">Nama Usaha</label>
<div class="relative">
<input class="block w-full rounded-lg border-outline-variant bg-surface-container-lowest py-3 px-4 text-on-surface font-body-md focus:border-primary focus:ring-primary min-h-[56px]" id="nama_usaha" name="nama_usaha" placeholder="Misal: Warung Makan Barokah" type="text"/>
</div>
</div>
<!-- Apa yang dijual -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="produk_jualan">Apa yang kamu jual?</label>
<div class="relative">
<textarea class="block w-full rounded-lg border-outline-variant bg-surface-container-lowest py-3 px-4 text-on-surface font-body-md focus:border-primary focus:ring-primary" id="produk_jualan" name="produk_jualan" placeholder="Sebutkan barang atau jasa secara spesifik..." rows="3"></textarea>
</div>
</div>
<!-- Kegiatan Utama -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="kegiatan_utama">Bagaimana kegiatan utamanya?</label>
<p class="font-caption text-caption text-on-surface-variant mb-2">Ceritakan prosesnya, dari mana dapat barang, atau cara melayani pembeli.</p>
<div class="relative">
<textarea class="block w-full rounded-lg border-outline-variant bg-surface-container-lowest py-3 px-4 text-on-surface font-body-md focus:border-primary focus:ring-primary" id="kegiatan_utama" name="kegiatan_utama" placeholder="Saya beli bahan baku di pasar, lalu dimasak dan dijual langsung ke pembeli yang datang..." rows="4"></textarea>
</div>
</div>
<!-- Cara Jualan (Pills) -->
<div>
<span class="block font-label-md text-label-md text-on-surface mb-base">Dijual secara?</span>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input class="peer sr-only" name="cara_jual" type="radio" value="online"/>
<div class="rounded-full border border-outline-variant bg-surface-container-lowest px-5 py-2 font-label-md text-label-md text-on-surface-variant transition-colors peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low min-h-[48px] flex items-center justify-center">
                                Online
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="cara_jual" type="radio" value="offline"/>
<div class="rounded-full border border-outline-variant bg-surface-container-lowest px-5 py-2 font-label-md text-label-md text-on-surface-variant transition-colors peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low min-h-[48px] flex items-center justify-center">
                                Offline
                            </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="cara_jual" type="radio" value="keduanya"/>
<div class="rounded-full border border-outline-variant bg-surface-container-lowest px-5 py-2 font-label-md text-label-md text-on-surface-variant transition-colors peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low min-h-[48px] flex items-center justify-center">
                                Keduanya
                            </div>
</label>
</div>
</div>
</form>
</div>
</main>
<!-- Sticky Bottom CTA for Mobile / Actions for Desktop -->
<div class="w-full bg-surface-container-lowest border-t border-border-light md:border-none md:bg-transparent px-container-padding-mobile md:px-0 py-4 shadow-[0_-4px_12px_rgba(0,0,0,0.1)] md:shadow-none sticky bottom-0 z-40 max-w-max-width-form flex flex-col md:flex-row-reverse md:justify-between gap-4 pb-safe mt-auto">
<button class="w-full md:w-auto inline-flex items-center justify-center rounded-full bg-primary px-6 py-3 font-label-md text-label-md text-on-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 min-h-[48px] transition-colors" type="button">
            Cari Rekomendasi KBLI
        </button>
<button class="w-full md:w-auto inline-flex items-center justify-center rounded-full border border-primary bg-transparent px-6 py-3 font-label-md text-label-md text-primary hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 min-h-[48px] transition-colors" type="button">
            Kembali
        </button>
</div>
</body></html>
