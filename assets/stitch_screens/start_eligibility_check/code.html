<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:items-center">
<header class="sticky top-0 z-50 flex items-center justify-between px-4 h-14 w-full bg-background dark:bg-background flat no shadows md:hidden">
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">NIB Assistant</h1>
<button class="text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity flex items-center justify-center p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</header>
<main class="flex-grow w-full md:max-w-max-width-form px-container-padding-mobile md:px-container-padding-desktop py-stack-lg flex flex-col">
<div class="mb-stack-lg text-center md:text-left mt-8 md:mt-12">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-stack-sm">
                Buat draft NIB tanpa bingung pilih KBLI
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                Jawab beberapa pertanyaan tentang usaha kamu. Kami bantu cari kandidat KBLI dan siapkan data sebelum diteruskan ke OSS.
            </p>
</div>
<form class="space-y-stack-md flex-grow">
<div class="bg-surface-card rounded-xl p-4 shadow-sm border border-border-light flex flex-col space-y-3">
<fieldset>
<legend class="font-label-md text-label-md text-on-surface mb-3">Tipe usaha</legend>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="tipe_usaha" type="radio" value="perorangan"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Perorangan</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="tipe_usaha" type="radio" value="badan_usaha"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Badan usaha</span>
</div>
</label>
</div>
</fieldset>
</div>
<div class="bg-surface-card rounded-xl p-4 shadow-sm border border-border-light flex flex-col space-y-3">
<fieldset>
<legend class="font-label-md text-label-md text-on-surface mb-3">Skala usaha</legend>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer relative">
<input class="peer sr-only" name="skala_usaha" type="radio" value="mikro"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Mikro</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="skala_usaha" type="radio" value="kecil"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Kecil</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="skala_usaha" type="radio" value="belum_tahu"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Belum tahu</span>
</div>
</label>
</div>
</fieldset>
</div>
<div class="bg-surface-card rounded-xl p-4 shadow-sm border border-border-light flex flex-col space-y-3">
<fieldset>
<legend class="font-label-md text-label-md text-on-surface mb-3">Sudah punya akun OSS?</legend>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer relative">
<input class="peer sr-only" name="akun_oss" type="radio" value="sudah"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Sudah</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="akun_oss" type="radio" value="belum"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Belum</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="akun_oss" type="radio" value="belum_yakin"/>
<div class="px-4 py-3 rounded-lg border border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container peer-checked:text-on-primary-container hover:bg-surface-container-low transition-colors min-h-[48px] flex items-center justify-center text-center">
<span class="font-body-md text-body-md">Belum yakin</span>
</div>
</label>
</div>
</fieldset>
</div>
</form>
<div class="mt-stack-lg pb-24 md:pb-8 flex flex-col gap-4">
<button class="w-full min-h-[48px] bg-primary text-on-primary font-label-md text-label-md rounded-full hover:opacity-90 transition-opacity flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-sm">
                Mulai buat draft NIB
            </button>
<button class="w-full min-h-[48px] bg-transparent border border-primary text-primary font-label-md text-label-md rounded-full hover:bg-surface-container-low transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                Cek data yang dibutuhkan
            </button>
</div>
</main>
